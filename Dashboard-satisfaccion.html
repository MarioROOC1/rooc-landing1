document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mat('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"109c4053-f4ab-4185-8915-f4952181da38\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e027fca6-52cd-4d06-bbda-029ec8e71d65\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"868552b5-8ce2-41b9-a354-9ce2dd7a4463\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<!-- Librerías por CDN -->\n<script src=\"c72eaf0f-1247-4e55-a556-6a6e5b1879fb\"><\u002Fscript>\n<script src=\"2ea40eb5-b08f-4743-a611-f82518a8b8a6\"><\u002Fscript>\n\n<style>\n  /* ===== Tokens de marca ROOC ===== */\n  :root{\n    --rooc-slate:#577C8E;\n    --rooc-blue:#2B7CA4;\n    --rooc-blue-light:#81ADD2;\n    --rooc-blue-bright:#0096D1;\n    --rooc-teal:#3EBDC6;\n    --rooc-burgundy:#83344A;\n    --rooc-yellow:#F6D60F;\n    --rooc-cream:#F4EFEB;\n\n    /* Semáforo (armonizado con la marca) */\n    --sem-green:#2F9E6E;\n    --sem-amber:#E6B00A;\n    --sem-red:#B04A5E;\n\n    --ink:#26343B;\n    --ink-soft:#5A6b73;\n    --border:#e3ddd6;\n    --shadow-sm:0 1px 3px rgba(87,124,142,.12), 0 1px 2px rgba(87,124,142,.08);\n    --shadow-md:0 6px 20px rgba(87,124,142,.14);\n    --radius-lg:20px;\n    --radius-md:14px;\n    --font-display:'League Spartan', sans-serif;\n    --font-sans:'Manrope', sans-serif;\n  }\n\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{\n    font-family:var(--font-sans);\n    color:var(--ink);\n    background:transparent;           /* óptimo para iframe de Wix */\n    -webkit-font-smoothing:antialiased;\n    line-height:1.5;\n  }\n  .wrap{\n    max-width:1160px;\n    margin:0 auto;\n    padding:16px 16px 32px;\n  }\n\n  /* ===== Encabezado ===== */\n  .header{\n    background:var(--rooc-slate);\n    color:#fff;\n    border-radius:var(--radius-lg);\n    padding:28px 30px;\n    position:relative;\n    overflow:hidden;\n  }\n  .header::after{ /* bloom de guijarro sutil */\n    content:\"\";\n    position:absolute;\n    right:-60px; top:-70px;\n    width:260px; height:230px;\n    background:rgba(255,255,255,.07);\n    border-radius:60% 40% 55% 45% / 55% 50% 50% 45%;\n    pointer-events:none;\n  }\n  .header h1{\n    font-family:var(--font-display);\n    font-weight:600;\n    font-size:clamp(1.5rem,3.4vw,2.15rem);\n    letter-spacing:-.015em;\n    margin:0;\n  }\n  .header p{\n    margin:6px 0 0;\n    font-size:clamp(.9rem,1.6vw,1.02rem);\n    color:rgba(255,255,255,.82);\n    font-weight:500;\n  }\n\n  /* ===== KPIs ===== */\n  .kpi-row{\n    display:grid;\n    grid-template-columns:repeat(4,1fr);\n    gap:16px;\n    margin-top:18px;\n  }\n  .kpi{\n    background:#fff;\n    border:1px solid var(--border);\n    border-radius:var(--radius-md);\n    padding:18px 20px;\n    box-shadow:var(--shadow-sm);\n    display:flex; flex-direction:column; gap:6px;\n  }\n  .kpi .label{\n    font-size:.72rem; font-weight:600; letter-spacing:.06em;\n    text-transform:uppercase; color:var(--ink-soft);\n  }\n  .kpi .value{\n    font-family:var(--font-display);\n    font-size:clamp(1.7rem,3.5vw,2.4rem);\n    font-weight:600; line-height:1; color:var(--rooc-blue);\n    letter-spacing:-.01em;\n  }\n  .kpi .sub{ font-size:.78rem; color:var(--ink-soft); }\n  .kpi.accent .value{ color:var(--rooc-burgundy); }\n\n  /* ===== Paneles / charts ===== */\n  .grid{\n    display:grid;\n    grid-template-columns:1.35fr 1fr;\n    gap:16px;\n    margin-top:16px;\n  }\n  .card{\n    background:#fff;\n    border:1px solid var(--border);\n    border-radius:var(--radius-lg);\n    padding:20px 22px;\n    box-shadow:var(--shadow-sm);\n  }\n  .card h2{\n    font-family:var(--font-display);\n    font-weight:600; font-size:1.06rem;\n    margin:0 0 4px; letter-spacing:-.01em;\n  }\n  .card .hint{ font-size:.8rem; color:var(--ink-soft); margin:0 0 14px; }\n  .q-note{\n    background:var(--rooc-cream);\n    border-radius:var(--radius-md);\n    padding:11px 14px;\n    margin:0 0 14px;\n  }\n  .q-note .q{ font-size:.86rem; font-weight:600; color:var(--rooc-blue); margin:0; }\n  .q-note .opts{ font-size:.76rem; color:var(--ink-soft); margin:5px 0 0; }\n  .chart-box{ position:relative; height:280px; }\n\n  /* Leyenda semáforo */\n  .legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:.75rem; color:var(--ink-soft); margin-top:12px; }\n  .legend span{ display:inline-flex; align-items:center; gap:6px; }\n  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }\n\n  /* ===== Comentarios ===== */\n  .comments-card{ margin-top:16px; }\n  .comments-list{\n    max-height:360px; overflow-y:auto;\n    display:flex; flex-direction:column; gap:12px;\n    padding-right:6px;\n  }\n  .comments-list::-webkit-scrollbar{ width:8px; }\n  .comments-list::-webkit-scrollbar-thumb{ background:var(--rooc-blue-light); border-radius:8px; }\n  .comment{\n    background:var(--rooc-cream);\n    border-radius:var(--radius-md);\n    padding:14px 16px;\n    border-left:3px solid var(--rooc-burgundy);\n  }\n  .comment .text{ font-size:.92rem; color:var(--ink); }\n  .comment .meta{\n    margin-top:8px; font-size:.74rem; font-weight:600;\n    color:var(--rooc-burgundy); letter-spacing:.01em;\n    display:flex; gap:8px; flex-wrap:wrap;\n  }\n  .comment .meta .sep{ color:var(--border); }\n\n  /* ===== Estados ===== */\n  .state{\n    text-align:center; padding:60px 20px; color:var(--ink-soft);\n    font-size:1rem;\n  }\n  .spinner{\n    width:34px; height:34px; margin:0 auto 16px;\n    border:3px solid var(--border); border-top-color:var(--rooc-blue-bright);\n    border-radius:50%; animation:spin .8s linear infinite;\n  }\n  @keyframes spin{ to{ transform:rotate(360deg); } }\n  .state.error{ color:var(--sem-red); }\n  .state.error strong{ display:block; font-family:var(--font-display); font-size:1.1rem; margin-bottom:6px; }\n\n  .hidden{ display:none !important; }\n\n  /* ===== Responsive ===== */\n  @media (max-width:860px){\n    .kpi-row{ grid-template-columns:repeat(2,1fr); }\n    .grid{ grid-template-columns:1fr; }\n    .chart-box{ height:250px; }\n  }\n  @media (max-width:480px){\n    .wrap{ padding:12px 12px 24px; }\n    .header{ padding:22px 20px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"wrap\">\n\n  <!-- Encabezado -->\n  <header class=\"header\">\n    <h1>ROOC · Encuesta de Satisfacción<\u002Fh1>\n    <p>Resumen general — histórico<\u002Fp>\n  <\u002Fheader>\n\n  <!-- Estado de carga -->\n  <div id=\"loading\" class=\"state\">\n    <div class=\"spinner\"><\u002Fdiv>\n    Cargando resultados…\n  <\u002Fdiv>\n\n  <!-- Estado de error -->\n  <div id=\"error\" class=\"state error hidden\">\n    <strong>No se pudieron cargar los datos<\u002Fstrong>\n    <span id=\"error-msg\">Revisa tu conexión e intenta de nuevo.<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- Dashboard -->\n  <main id=\"dashboard\" class=\"hidden\">\n\n    <section class=\"kpi-row\">\n      <div class=\"kpi\">\n        <span class=\"label\">Respuestas totales<\u002Fspan>\n        <span class=\"value\" id=\"kpi-total\">—<\u002Fspan>\n        <span class=\"sub\">encuestas válidas<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"kpi\">\n        <span class=\"label\">Promedio global 1–5<\u002Fspan>\n        <span class=\"value\" id=\"kpi-global\">—<\u002Fspan>\n        <span class=\"sub\">4 dimensiones<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"kpi\">\n        <span class=\"label\">Recomendación prom.<\u002Fspan>\n        <span class=\"value\" id=\"kpi-rec\">—<\u002Fspan>\n        <span class=\"sub\">escala 1–5<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"kpi accent\">\n        <span class=\"label\">% Promotores<\u002Fspan>\n        <span class=\"value\" id=\"kpi-promo\">—<\u002Fspan>\n        <span class=\"sub\">recomendación = 5<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <div class=\"grid\">\n      <div class=\"card\">\n        <h2>Promedios por dimensión<\u002Fh2>\n        <div class=\"q-note\">\n          <p class=\"q\">«¿Cómo calificarías cada aspecto del taller?»<\u002Fp>\n        <\u002Fdiv>\n        <p class=\"hint\">Escala 0–5 · color según desempeño<\u002Fp>\n        <div class=\"chart-box\"><canvas id=\"chart-dims\"><\u002Fcanvas><\u002Fdiv>\n        <div class=\"legend\">\n          <span><i class=\"dot\" style=\"background:var(--sem-green)\"><\u002Fi> ≥ 4.5<\u002Fspan>\n          <span><i class=\"dot\" style=\"background:var(--sem-amber)\"><\u002Fi> 4.0 – 4.49<\u002Fspan>\n          <span><i class=\"dot\" style=\"background:var(--sem-red)\"><\u002Fi> &lt; 4.0<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h2>Comparado con otros talleres<\u002Fh2>\n        <div class=\"q-note\">\n          <p class=\"q\">«Comparado con otros talleres que has tomado, este fue…»<\u002Fp>\n        <\u002Fdiv>\n        <p class=\"hint\">Distribución de respuestas<\u002Fp>\n        <div class=\"chart-box\"><canvas id=\"chart-comp\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card comments-card\">\n      <h2>Comentarios recientes<\u002Fh2>\n      <p class=\"hint\">Más recientes primero · máx. 15<\u002Fp>\n      <div class=\"comments-list\" id=\"comments\"><\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<script>\n/* =========================================================\n   CONFIGURACIÓN\n   Cambia esta línea para apuntar a otro CSV publicado.\n   ========================================================= */\nconst CSV_URL = \"https://docs.google.com/spreadsheets/d/e/2PACX-1vT2jCSNr_kKCeC58e7dBisglBI7vGZ4kElRv2qXq6ggt29neY834FxMCRvYnpRJ4lwD0ZIchoTS2Aau/pub?gid=543618393&single=true&output=csv\";\n\n/* Índices de columna (0-based) según la estructura del CSV */\nconst COL = {\n  timestamp:   0,  // Marca temporal\n  cliente:     1,  // Cliente / Organización\n  taller:      2,  // Taller / Programa\n  fecha:       3,  // Fecha del taller\n  relevancia:  4,  // 1–5\n  facilitacion:5,  // 1–5\n  duracion:    6,  // 1–5\n  aplicabilidad:7, // 1–5\n  comparativo: 8,  // texto\n  recomendacion:9, // 1–5\n  comentario: 10   // texto abierto\n};\n\n/* ---- Utilidades ---- */\nfunction toNum(v){\n  if(v===null || v===undefined) return null;\n  const s = String(v).trim().replace(\",\", \".\");\n  if(s===\"\") return null;\n  const n = parseFloat(s);\n  return Number.isFinite(n) ? n : null;\n}\nfunction avg(arr){\n  const vals = arr.filter(n => n!==null && Number.isFinite(n));\n  if(vals.length===0) return null;\n  return vals.reduce((a,b)=>a+b,0)/vals.length;\n}\nfunction fmt(n,dec){ return (n===null) ? \"—\" : n.toFixed(dec); }\nfunction esc(s){\n  return String(s).replace(/[&<>\"']/g, c => (\n    {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]\n  ));\n}\n/* Parseo tolerante de fechas (Google Forms suele usar M/D/AAAA H:mm:ss o D/M/AAAA) */\nfunction parseTS(v){\n  if(!v) return 0;\n  const s = String(v).trim();\n  let t = Date.parse(s);\n  if(!isNaN(t)) return t;\n  // Intento manual: separadores / o -\n  const m = s.match(/(\\d{1,4})[\\/\\-](\\d{1,2})[\\/\\-](\\d{1,4})[ ,]*(\\d{1,2}):?(\\d{1,2})?/);\n  if(m){\n    let [_,a,b,c,h,mi] = m;\n    a=+a; b=+b; c=+c; h=+h||0; mi=+mi||0;\n    let year, mon, day;\n    if(a>31){ year=a; mon=b; day=c; }        // AAAA/M/D\n    else { day=a; mon=b; year=c; }           // D/M/AAAA (convención MX)\n    if(year<100) year+=2000;\n    const d = new Date(year, (mon||1)-1, day||1, h, mi);\n    if(!isNaN(d.getTime())) return d.getTime();\n  }\n  return 0;\n}\n\nconst semColor = v => v>=4.5 ? getVar('--sem-green') : v>=4.0 ? getVar('--sem-amber') : getVar('--sem-red');\nfunction getVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }\n\n/* ---- Carga ---- */\nfetch(CSV_URL)\n  .then(r => {\n    if(!r.ok) throw new Error(\"HTTP \" + r.status);\n    return r.text();\n  })\n  .then(text => {\n    const parsed = Papa.parse(text, { skipEmptyLines:\"greedy\" });\n    let rows = parsed.data || [];\n    if(rows.length <= 1) throw new Error(\"El CSV no contiene datos.\");\n    rows = rows.slice(1); // saltar encabezados\n    // Ignorar filas totalmente vacías\n    rows = rows.filter(r => Array.isArray(r) && r.some(c => String(c).trim() !== \"\"));\n    if(rows.length === 0) throw new Error(\"No hay respuestas válidas en el CSV.\");\n    render(rows);\n  })\n  .catch(err => {\n    document.getElementById(\"loading\").classList.add(\"hidden\");\n    const box = document.getElementById(\"error\");\n    box.classList.remove(\"hidden\");\n    document.getElementById(\"error-msg\").textContent =\n      \"Detalle: \" + err.message + \". Verifica que el CSV siga publicado y accesible.\";\n    console.error(\"Error al cargar el CSV:\", err);\n  });\n\n/* ---- Render ---- */\nfunction render(rows){\n  const total = rows.length;\n\n  // Dimensiones por fila\n  const dimKeys = [COL.relevancia, COL.facilitacion, COL.duracion, COL.aplicabilidad];\n  const relevancia   = rows.map(r=>toNum(r[COL.relevancia]));\n  const facilitacion = rows.map(r=>toNum(r[COL.facilitacion]));\n  const duracion     = rows.map(r=>toNum(r[COL.duracion]));\n  const aplicabilidad= rows.map(r=>toNum(r[COL.aplicabilidad]));\n  const recomendacion= rows.map(r=>toNum(r[COL.recomendacion]));\n\n  // Promedio global = promedio de las 4 dimensiones (todas las celdas válidas)\n  const allDims = [].concat(relevancia,facilitacion,duracion,aplicabilidad);\n  const global = avg(allDims);\n  const recProm = avg(recomendacion);\n\n  // % promotores (recomendación = 5), sobre recomendaciones válidas\n  const recValid = recomendacion.filter(n => n!==null);\n  const promoters = recValid.filter(n => n===5).length;\n  const promoPct = recValid.length ? Math.round((promoters/recValid.length)*100) : null;\n\n  // KPIs\n  document.getElementById(\"kpi-total\").textContent  = total;\n  document.getElementById(\"kpi-global\").textContent = fmt(global,2);\n  document.getElementById(\"kpi-rec\").textContent    = fmt(recProm,2);\n  document.getElementById(\"kpi-promo\").textContent  = promoPct===null ? \"—\" : promoPct + \"%\";\n\n  // Mostrar dashboard\n  document.getElementById(\"loading\").classList.add(\"hidden\");\n  document.getElementById(\"dashboard\").classList.remove(\"hidden\");\n\n  /* ---- Gráfico: promedios por dimensión ---- */\n  const dimLabels = [\"Relevancia\",\"Facilitación\",\"Duración/Ritmo\",\"Aplicabilidad\",\"Recomendación\"];\n  const dimAvgs = [\n    avg(relevancia), avg(facilitacion), avg(duracion), avg(aplicabilidad), avg(recomendacion)\n  ].map(v => v===null ? 0 : +v.toFixed(2));\n  const dimColors = dimAvgs.map(semColor);\n\n  new Chart(document.getElementById(\"chart-dims\"), {\n    type:\"bar\",\n    data:{ labels:dimLabels, datasets:[{ data:dimAvgs, backgroundColor:dimColors, borderRadius:8, maxBarThickness:54 }] },\n    options:{\n      responsive:true, maintainAspectRatio:false,\n      plugins:{ legend:{display:false},\n        tooltip:{ callbacks:{ label:c=> \" \" + c.parsed.y.toFixed(2) + \" / 5\" } } },\n      scales:{\n        y:{ beginAtZero:true, max:5, ticks:{ stepSize:1, color:getVar('--ink-soft') },\n            grid:{ color:'rgba(87,124,142,.12)' } },\n        x:{ ticks:{ color:getVar('--ink-soft'), font:{size:11} }, grid:{display:false} }\n      }\n    }\n  });\n\n  /* ---- Gráfico: comparativo (dona) ---- */\n  const compOrder = [\"Claramente mejor\",\"Algo mejor\",\"Similar\",\"Algo peor\",\"Claramente peor\",\"No tengo con que compararlo\"];\n  const compCounts = {};\n  compOrder.forEach(k=>compCounts[k]=0);\n  let compOther = 0;\n  rows.forEach(r=>{\n    const raw = String(r[COL.comparativo]||\"\").trim();\n    if(raw===\"\") return;\n    const match = compOrder.find(k => k.toLowerCase() === raw.toLowerCase());\n    if(match) compCounts[match]++;\n    else { compCounts[raw] = (compCounts[raw]||0)+1; }\n  });\n  const compLabels = Object.keys(compCounts).filter(k=>compCounts[k]>0);\n  const compData = compLabels.map(k=>compCounts[k]);\n  const compPalette = {\n    \"Claramente mejor\":getVar('--sem-green'),\n    \"Algo mejor\":getVar('--rooc-teal'),\n    \"Similar\":getVar('--rooc-blue-light'),\n    \"Algo peor\":getVar('--sem-amber'),\n    \"Claramente peor\":getVar('--sem-red'),\n    \"No tengo con que compararlo\":getVar('--rooc-slate')\n  };\n  const compColors = compLabels.map(k => compPalette[k] || getVar('--rooc-blue'));\n\n  if(compLabels.length){\n    new Chart(document.getElementById(\"chart-comp\"), {\n      type:\"doughnut\",\n      data:{ labels:compLabels, datasets:[{ data:compData, backgroundColor:compColors, borderColor:'#fff', borderWidth:2 }] },\n      options:{\n        responsive:true, maintainAspectRatio:false, cutout:'58%',\n        plugins:{ legend:{ position:'bottom', labels:{ boxWidth:12, padding:12, color:getVar('--ink'), font:{size:11} } } }\n      }\n    });\n  } else {\n    document.getElementById(\"chart-comp\").parentElement.innerHTML =\n      '<div class=\"state\" style=\"padding:40px 0\">Sin datos comparativos.<\u002Fdiv>';\n  }\n\n  /* ---- Comentarios recientes ---- */\n  const withIdx = rows.map((r,i)=>({ r, ts:parseTS(r[COL.timestamp]), i }));\n  const comments = withIdx\n    .filter(o => String(o.r[COL.comentario]||\"\").trim() !== \"\")\n    .sort((a,b) => (b.ts - a.ts) || (b.i - a.i))\n    .slice(0,15);\n\n  const box = document.getElementById(\"comments\");\n  if(comments.length===0){\n    box.innerHTML = '<div class=\"state\" style=\"padding:24px 0\">Aún no hay comentarios.<\u002Fdiv>';\n  } else {\n    box.innerHTML = comments.map(o=>{\n      const txt = esc(String(o.r[COL.comentario]).trim());\n      const cli = esc(String(o.r[COL.cliente]||\"\").trim() || \"Anónimo\");\n      const fch = esc(String(o.r[COL.fecha]||\"\").trim());\n      const metaFch = fch ? '<span class=\"sep\">·<\u002Fspan><span>'+fch+'<\u002Fspan>' : '';\n      return '<div class=\"comment\"><div class=\"text\">'+txt+'<\u002Fdiv>'+\n             '<div class=\"meta\"><span>'+cli+'<\u002Fspan>'+metaFch+'<\u002Fdiv><\u002Fdiv>';\n    }).join(\"\");\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
